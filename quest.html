<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ᛃ</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=IBM+Plex+Sans:wght@300&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--stone:#A0937D;--sand:#C4B69C;--fog:#7A7A7A;--deep:#0B0B0B}
    body{background:var(--deep);color:var(--fog);
      font-family:'IBM Plex Sans',sans-serif;font-weight:300;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;
      padding:2rem 1.5rem}
    .rune{font-size:clamp(4rem,14vw,7rem);color:var(--stone);opacity:.14;
      line-height:1;user-select:none}
    .lines{margin-top:3rem;font-size:.95rem;line-height:2.4;letter-spacing:.04em}
    .lines em{font-style:normal;color:var(--sand)}
    .seal{margin-top:3.5rem;font-size:.8rem;letter-spacing:.12em}
    .seal a{color:var(--sand);text-decoration:none;border-bottom:1px solid var(--stone)}
    .back{margin-top:4rem;font-size:.75rem;opacity:.5}
    .back a{color:inherit;text-decoration:none}
  </style>
</head>
<body>
  <div class="rune" aria-hidden="true">ᛃ</div>
  <div class="lines">
    Some doors are not opened. They are grown.<br>
    There is a game beneath the surface. <em>It has not begun.</em><br>
    When it begins, you will not need to be told.
  </div>
  <div class="seal">
    Only what is signed is true. — <a href="/pgp.html">the seal</a>
  </div>
  <div class="back"><a href="/">return</a></div>
  <!--
    ᛃ — Seasons turn whether you watch or not.
    Patience is not waiting. It is ripening.
  -->
</body>
</html>
